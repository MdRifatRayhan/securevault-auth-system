<!DOCTYPE html>
<html>
<head>
<title>SecureVault Pro</title>

<style>
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body {
  font-family: Arial;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(270deg,#667eea,#764ba2,#00c6ff);
  background-size: 600% 600%;
  animation: gradient 10s ease infinite;
}

@keyframes gradient {
  0% {background-position:0% 50%;}
  50% {background-position:100% 50%;}
  100% {background-position:0% 50%;}
}

.card {
  width:380px;
  padding:30px;
  border-radius:20px;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(20px);
  box-shadow: 0 10px 40px rgba(0,0,0,0.3);
  color:white;
}

h2, h3 {
  text-align:center;
  margin-bottom:10px;
}

input {
  width:100%;
  padding:12px;
  margin:8px 0;
  border:none;
  border-radius:10px;
}

button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#00c6ff;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.secondary {
  background:transparent;
  border:1px solid white;
}

#msg #msg {
  text-align:center;
  margin-top:10px;
  font-size:14px;
  padding:10px;
  border-radius:8px;
}

.success {
  background:#2ecc71;
  color:white;
}

.error {
  background:#e74c3c;
  color:white;
}

.toggle {
  display:flex;
  justify-content:flex-end;
  margin-bottom:10px;
}

.hidden {
  display:none;
}
#strengthText{
  margin-top:5px;
  font-size:14px;
  font-weight:bold;
}
#historyList{
  margin-top:10px;
  padding-left:20px;
}

#historyList li{
  margin:5px 0;
  font-size:14px;
}
.dashboard-card{

  padding:25px;

  border-radius:20px;

  background:
  rgba(255,255,255,0.12);

  backdrop-filter: blur(15px);

  box-shadow:
  0 8px 30px rgba(0,0,0,0.3);

  animation:
  fadeIn 0.5s ease;
}

.history-box{

  margin-top:20px;

  padding:15px;

  border-radius:15px;

  background:
  rgba(255,255,255,0.08);
}

#dashboardTitle{

  margin-bottom:10px;
}

#welcomeText{

  font-size:18px;

  margin-bottom:10px;
}

#lastLoginText{

  font-size:14px;

  opacity:0.9;
}

@keyframes fadeIn{

  from{

    opacity:0;
    transform:
    translateY(15px);
  }

  to{

    opacity:1;
    transform:
    translateY(0);
  }
}
button:disabled{

  opacity:0.6;

  cursor:not-allowed;
}
#toast{

  position:fixed;

  top:20px;
  right:20px;

  padding:15px 20px;

  border-radius:12px;

  color:white;

  font-weight:bold;

  opacity:0;

  transform:
  translateY(-20px);

  transition:0.3s;

  z-index:999;
}

.toast-success{

  background:#2ecc71;
}

.toast-error{

  background:#e74c3c;
}

.toast-show{

  opacity:1;

  transform:
  translateY(0);
}
</style>
</head>

<body>

<div class="card">

<div class="toggle">
<label>🌙</label>
<input type="checkbox" onclick="toggleMode()">
</div>

<!-- LOGIN -->
<div id="loginBox">
<h2>🔐 SecureVault</h2>
<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">
<button onclick="togglePass()">👁 Show/Hide Password</button>
<button onclick="login()">Login</button>

<button class="secondary" onclick="showRegister()">Create Account</button>
<button class="secondary" onclick="forgot()">Forgot Password</button>
</div>

<!-- REGISTER -->
<div id="registerBox" class="hidden">
<h2>🆕 Create Account</h2>
<input id="regUser" placeholder="Username">
<input
id="regPass"
type="password"
placeholder="Password (8 chars, uppercase, number, special)"
oninput="checkStrength()">
<p id="strengthText"></p>
<button onclick="register()">Register</button>
<button class="secondary" onclick="showLogin()">Back to Login</button>
</div>

<!-- OTP -->
<div id="otpBox" class="hidden">
<h2>🔢 Enter OTP</h2>
<input id="otp" placeholder="Enter OTP">

<p id="timer"></p>

<button onclick="verifyOtp()">Verify OTP</button>
<button
id="resendBtn"
class="secondary"
onclick="resendOtp()">

Resend OTP

</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">

  <div class="dashboard-card">

    <h2 id="dashboardTitle">
      ✅ Welcome
    </h2>

    <p id="welcomeText">
      Secure Login Successful
    </p>

    <p id="lastLoginText"></p>

    <div class="history-box">

      <h3>Recent Logins</h3>

      <ul id="historyList"></ul>

    </div>

    <button onclick="getProfile()">
      Check Protected Route
    </button>

    <button onclick="logout()">
      Logout
    </button>

  </div>

</div>

<!-- RESET -->
<div id="resetBox" class="hidden">
<h3>🔁 Reset Password</h3>
<input id="resetToken" placeholder="Enter token">
<input id="newPass" type="password" placeholder="New password">
<button onclick="resetPassword()">Reset Password</button>
</div>

<p id="msg"></p>

</div>

<script>

 function showMsg(message, type="success") {

  toast.innerText = message;

  toast.className = "";

  toast.classList.add(
    type === "success"
    ? "toast-success"
    : "toast-error"
  );

  toast.classList.add("toast-show");

  setTimeout(() => {

    toast.classList.remove(
      "toast-show"
    );

  }, 3000);
}

/* ================= CSRF ================= */
async function getCSRF() {
  const res = await fetch("/api/csrf-token");
  const data = await res.json();
  return data.csrfToken;
}

/* ================= TIMER ================= */
let timeLeft = 45;
let timerInterval;
let resendCooldown = 30;
let resendInterval;

function startTimer() {
  timeLeft = 45;

  clearInterval(timerInterval);

  timerInterval = setInterval(() => {
    document.getElementById("timer").innerText =
      "⏳ Time left: " + timeLeft + "s";

    timeLeft--;

    if (timeLeft < 0) {
      clearInterval(timerInterval);
      document.getElementById("timer").innerText = "❌ OTP expired";
    }
  }, 1000);
}

function startResendCooldown() {

  resendBtn.disabled = true;

  resendCooldown = 30;

  resendBtn.innerText =
  "Resend in " +
  resendCooldown + "s";

  clearInterval(resendInterval);

  resendInterval = setInterval(() => {

    resendCooldown--;

    resendBtn.innerText =
    "Resend in " +
    resendCooldown + "s";

    if (resendCooldown < 0) {

      clearInterval(resendInterval);

      resendBtn.disabled = false;

      resendBtn.innerText =
      "Resend OTP";
    }

  }, 1000);
}

/* ================= PASSWORD TOGGLE ================= */
function togglePass() {
  pass.type = pass.type === "password" ? "text" : "password";
}

function checkStrength() {

  const password =
  regPass.value;

  let strength = "";

  if (password.length < 6) {

    strength = "Weak ❌";

  }

  else if (
    password.match(/[A-Z]/) &&
    password.match(/[0-9]/)
  ) {

    strength = "Medium ⚠️";

  }

  if (
    password.match(/[A-Z]/) &&
    password.match(/[0-9]/) &&
    password.match(/[@$!%*?&#]/) &&
    password.length >= 8
  ) {

    strength = "Strong ✅";
  }

  strengthText.innerText =
  "Password Strength: " + strength;
}

/* ================= DARK MODE ================= */
function toggleMode() {
  document.body.classList.toggle("dark");
}

/* ================= NAVIGATION ================= */
function showRegister() {
  loginBox.classList.add("hidden");
  registerBox.classList.remove("hidden");
}

function showLogin() {
  registerBox.classList.add("hidden");
  resetBox.classList.add("hidden");
  otpBox.classList.add("hidden");
  loginBox.classList.remove("hidden");
}

/* ================= REGISTER ================= */
async function register() {

 const strongPassword =
/^(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&#]).{8,}$/;

if (!strongPassword.test(regPass.value)) {

  showMsg(
    "Password must contain 8 characters, 1 uppercase letter, 1 number and 1 special character",
    "error"
  );

  return;
}

  const token = await getCSRF();

  const res = await fetch("/api/register", {
    method:"POST",
    credentials:"include",
    headers:{
      "Content-Type":"application/json",
      "CSRF-Token":token
    },
    body:JSON.stringify({
      username:regUser.value,
      password:regPass.value
    })
  });

  const data = await res.json();

if (!data.success) {

  localStorage.removeItem("token");

  dashboard.classList.add("hidden");

  loginBox.classList.remove("hidden");

  showMsg(
    "Session expired. Login again.",
    "error"
  );

  return;
}

showMsg(
  data.message,
  data.success ? "success" : "error"
);

  if (data.success) {
    setTimeout(showLogin, 1000);
  }
}

/* ================= LOGIN ================= */
async function login() {
const buttons =
document.querySelectorAll("button");

const loginBtn =
document.querySelector(
'button[onclick="login()"]'
);

loginBtn.disabled = true;

loginBtn.innerText =
"Logging in...";
  const token = await getCSRF();

  const res = await fetch("/api/login", {
    method:"POST",
    credentials:"include",
    headers:{
      "Content-Type":"application/json",
      "CSRF-Token":token
    },
    body:JSON.stringify({
      username:user.value,
      password:pass.value
    })
  });

  const data = await res.json();
  loginBtn.disabled = false;

loginBtn.innerText =
"Login";
  showMsg(data.message, data.success ? "success" : "error");

  if (data.success) {
    loginBox.classList.add("hidden");
    otpBox.classList.remove("hidden");

    startTimer(); // 🔥 TIMER START
    startResendCooldown();
  }
}

/* ================= VERIFY OTP ================= */
async function verifyOtp() {
  const token = await getCSRF();

  const res = await fetch("/api/verify-otp", {
    method:"POST",
    credentials:"include",
    headers:{
      "Content-Type":"application/json",
      "CSRF-Token":token
    },
    body:JSON.stringify({
      otp:otp.value
    })
  });

  const data = await res.json();
  showMsg(data.message, data.success ? "success" : "error");

if (data.success) {

  localStorage.setItem("token", data.token);

  clearInterval(timerInterval);

 otpBox.classList.add("hidden");

dashboard.classList.remove("hidden");

welcomeText.innerText =
"Welcome, " + data.username;

dashboardTitle.innerText =
"✅ " +
data.username +
"'s Dashboard";

lastLoginText.innerText =
"Last Login: " +
data.lastLogin;

historyList.innerHTML = "";

data.loginHistory.forEach(item => {

  historyList.innerHTML +=
  `<li>${item}</li>`;

});
}
}

/* ================= RESEND OTP ================= */
async function resendOtp() {

  if (resendBtn.disabled) return;

  const token = await getCSRF();

  const res = await fetch("/api/resend-otp", {

    method:"POST",

    credentials:"include",

    headers:{
      "Content-Type":"application/json",
      "CSRF-Token":token
    }

  });

  const data = await res.json();

  showMsg(
    data.message,
    data.success ? "success" : "error"
  );

  if (data.success) {

    startTimer();

    startResendCooldown();
  }
}

/* ================= FORGOT ================= */
async function forgot() {
  const token = await getCSRF();

  if (!user.value) {
    msg.innerText = "Enter username first";
    return;
  }

  const res = await fetch("/api/forgot-password", {
    method:"POST",
    credentials:"include",
    headers:{
      "Content-Type":"application/json",
      "CSRF-Token":token
    },
    body:JSON.stringify({
      username: user.value
    })
  });

  const data = await res.json();
  showMsg(data.message, data.success ? "success" : "error");

  resetBox.classList.remove("hidden");
}

/* ================= RESET ================= */
async function resetPassword() {
  const token = await getCSRF();

  const res = await fetch("/api/reset-password", {
    method:"POST",
    credentials:"include",
    headers:{
      "Content-Type":"application/json",
      "CSRF-Token":token
    },
    body:JSON.stringify({
      token:resetToken.value,
      newPassword:newPass.value
    })
  });

  const data = await res.json();
  showMsg(data.message, data.success ? "success" : "error");

  if (data.success) {
    showLogin();
  }
}

async function getProfile() {

  const token =
  localStorage.getItem("token");

  const res = await fetch("/api/profile", {

    headers: {
      Authorization: token
    }

  });

  const data = await res.json();

  if (!data.success) {

    localStorage.removeItem("token");

    showMsg(
      "Session expired. Login again.",
      "error"
    );

    setTimeout(() => {

      location.reload();

    }, 1000);

    return;
  }

  showMsg(
    data.message,
    "success"
  );
}

/* ================= LOGOUT ================= */
function logout() {

  localStorage.removeItem("token");

  dashboard.classList.add("hidden");

  loginBox.classList.remove("hidden");

  user.value = "";
  pass.value = "";
  otp.value = "";

  showMsg(
    "Logged out successfully",
    "success"
  );
}

  /* ================= AUTO LOGIN ================= */

window.onload = async function () {

  const token =
  localStorage.getItem("token");

  if (!token) return;

  try {

    const res = await fetch("/api/profile", {

      headers: {
        Authorization: token
      }

    });

    const data = await res.json();

   if (data.success) {

  loginBox.classList.add("hidden");

  dashboard.classList.remove("hidden");

  welcomeText.innerText =
  data.message;
  const username =
data.message.replace("Welcome, ", "");

dashboardTitle.innerText =
"✅ " + username + "'s Dashboard";
  lastLoginText.innerText =
"Last Login: " + data.lastLogin;
historyList.innerHTML = "";

data.loginHistory.forEach(item => {

  historyList.innerHTML +=
  `<li>${item}</li>`;

});

} else {

  localStorage.removeItem("token");

  dashboard.classList.add("hidden");

  loginBox.classList.remove("hidden");
}

  } catch (err) {

    console.log(err);

  }
};

</script>
<div id="toast"></div>

</body>
</html>
