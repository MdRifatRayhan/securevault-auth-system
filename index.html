<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SecureVault</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #1e1e2f, #3a3a6a);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
}

.card {
  width: 350px;
  padding: 30px;
  border-radius: 15px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  box-shadow: 0 0 30px rgba(0,0,0,0.5);
  text-align: center;
}

input {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 8px;
  border: none;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 8px;
  background: #00c6ff;
  color: black;
  font-weight: bold;
  cursor: pointer;
}

.link {
  margin-top: 10px;
  cursor: pointer;
  color: #00c6ff;
  font-size: 13px;
}

.hidden { display: none; }
</style>
</head>

<body>

<div class="card">

<!-- LOGIN -->
<div id="loginBox">
  <h2>Login</h2>
  <input id="user" placeholder="Username">
  <input id="pass" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
  <div class="link" onclick="showRegister()">Create Account</div>
  <div class="link" onclick="showForgot()">Forgot Password?</div>
</div>

<!-- REGISTER -->
<div id="registerBox" class="hidden">
  <h2>Register</h2>
  <input id="regUser" placeholder="Username">
  <input id="regPass" type="password" placeholder="Password">
  <button onclick="register()">Register</button>
  <div class="link" onclick="showLogin()">Back to Login</div>
</div>

<!-- OTP -->
<div id="otpBox" class="hidden">
  <h2>Enter OTP</h2>
  <input id="otp" placeholder="OTP">
  <button onclick="verifyOtp()">Verify</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">
  <h2>✅ Welcome</h2>
  <button onclick="logout()">Logout</button>
</div>

<!-- FORGOT -->
<div id="forgotBox" class="hidden">
  <h2>Reset Password</h2>
  <input id="resetToken" placeholder="Token">
  <input id="newPass" placeholder="New Password">
  <button onclick="resetPassword()">Reset</button>
</div>

<p id="msg"></p>

</div>

<script>

// CSRF
async function getCSRF() {
  const res = await fetch("/api/csrf-token");
  const data = await res.json();
  return data.csrfToken;
}

// REGISTER
async function register() {
  const token = await getCSRF();

  const res = await fetch("/api/register", {
    method: "POST",
    credentials: "include",
    headers: {
      "Content-Type": "application/json",
      "CSRF-Token": token
    },
    body: JSON.stringify({
      username: regUser.value,
      password: regPass.value
    })
  });

  const data = await res.json();
  msg.innerText = data.message;
}

// LOGIN
async function login() {
  const token = await getCSRF();

  const res = await fetch("/api/login", {
    method: "POST",
    credentials: "include",
    headers: {
      "Content-Type": "application/json",
      "CSRF-Token": token
    },
    body: JSON.stringify({
      username: user.value,
      password: pass.value
    })
  });

  const data = await res.json();
  msg.innerText = data.message;

  if (data.success) {
    loginBox.classList.add("hidden");
    otpBox.classList.remove("hidden");
  }
}

// VERIFY OTP
async function verifyOtp() {
  const token = await getCSRF();

  const res = await fetch("/api/verify-otp", {
    method: "POST",
    credentials: "include",
    headers: {
      "Content-Type": "application/json",
      "CSRF-Token": token
    },
    body: JSON.stringify({
      otp: otp.value
    })
  });

  const data = await res.json();
  msg.innerText = data.message;

  if (data.success) {
    otpBox.classList.add("hidden");
    dashboard.classList.remove("hidden");
  }
}

// RESET
async function resetPassword() {
  const token = await getCSRF();

  const res = await fetch("/api/reset-password", {
    method: "POST",
    credentials: "include",
    headers: {
      "Content-Type": "application/json",
      "CSRF-Token": token
    },
    body: JSON.stringify({
      token: resetToken.value,
      newPassword: newPass.value
    })
  });

  const data = await res.json();
  msg.innerText = data.message;
}

// NAVIGATION
function showRegister() {
  loginBox.classList.add("hidden");
  registerBox.classList.remove("hidden");
}

function showLogin() {
  registerBox.classList.add("hidden");
  loginBox.classList.remove("hidden");
}

function showForgot() {
  loginBox.classList.add("hidden");
  forgotBox.classList.remove("hidden");
}

// LOGOUT
function logout() {
  localStorage.removeItem("token");
  location.reload();
}

</script>

</body>
</html>
