<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SecureVault</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #1e1e2f, #3a3a6a);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
}

.card {
  width: 350px;
  padding: 30px;
  border-radius: 15px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  box-shadow: 0 0 30px rgba(0,0,0,0.5);
  text-align: center;
  animation: fadeIn 0.5s ease;
}

h1 {
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 8px;
  border: none;
  outline: none;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 8px;
  background: #00c6ff;
  color: black;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #00a2d3;
}

#msg {
  margin-top: 10px;
  font-size: 14px;
}

.link {
  margin-top: 10px;
  cursor: pointer;
  color: #00c6ff;
  font-size: 13px;
}

.hidden {
  display: none;
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(10px);}
  to {opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="card">

  <!-- LOGIN -->
  <div id="loginBox">
    <h1>🔐 SecureVault</h1>
    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <div class="link" onclick="showForgot()">Forgot Password?</div>
  </div>

  <!-- OTP -->
  <div id="otpBox" class="hidden">
    <h1>Enter OTP</h1>
    <input id="otp" placeholder="Enter OTP">
    <button onclick="verifyOtp()">Verify OTP</button>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard" class="hidden">
    <h1>✅ Welcome</h1>
    <p>Secure Login Successful</p>
    <button onclick="logout()">Logout</button>
  </div>

  <!-- FORGOT -->
  <div id="forgotBox" class="hidden">
    <h1>Reset Password</h1>
    <input id="resetToken" placeholder="Enter Token">
    <input id="newPass" placeholder="New Password">
    <button onclick="resetPassword()">Reset</button>
  </div>

  <p id="msg"></p>

</div>

<script>

// CSRF token
async function getCSRF() {
  const res = await fetch("/api/csrf-token");
  const data = await res.json();
  return data.csrfToken;
}

// LOGIN
async function login() {
  const token = await getCSRF();

  const res = await fetch("/api/login", {
    method: "POST",
    credentials: "include",
    headers: {
      "Content-Type": "application/json",
      "CSRF-Token": token
    },
    body: JSON.stringify({
      username: user.value,
      password: pass.value
    })
  });

  const data = await res.json();
  msg.innerText = data.message;

  if (data.success) {
    loginBox.classList.add("hidden");
    otpBox.classList.remove("hidden");
  }
}

// VERIFY OTP
async function verifyOtp() {
  const token = await getCSRF();

  const res = await fetch("/api/verify-otp", {
    method: "POST",
    credentials: "include",
    headers: {
      "Content-Type": "application/json",
      "CSRF-Token": token
    },
    body: JSON.stringify({
      otp: otp.value
    })
  });

  const data = await res.json();
  msg.innerText = data.message;

  if (data.success) {
    otpBox.classList.add("hidden");
    dashboard.classList.remove("hidden");
  }
}

// RESET PASSWORD
async function resetPassword() {
  const token = await getCSRF();

  const res = await fetch("/api/reset-password", {
    method: "POST",
    credentials: "include",
    headers: {
      "Content-Type": "application/json",
      "CSRF-Token": token
    },
    body: JSON.stringify({
      token: resetToken.value,
      newPassword: newPass.value
    })
  });

  const data = await res.json();
  msg.innerText = data.message;
}

// SHOW FORGOT
function showForgot() {
  loginBox.classList.add("hidden");
  forgotBox.classList.remove("hidden");
}

// LOGOUT
function logout() {
  localStorage.removeItem("token");
  location.reload();
}

</script>

</body>
</html>
