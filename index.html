<!DOCTYPE html>
<html>
<head>
<title>SecureVault Pro</title>

<style>
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body {
  font-family: Arial;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(270deg,#667eea,#764ba2,#00c6ff);
  background-size: 600% 600%;
  animation: gradient 10s ease infinite;
}

@keyframes gradient {
  0% {background-position:0% 50%;}
  50% {background-position:100% 50%;}
  100% {background-position:0% 50%;}
}

.card {
  width:380px;
  padding:30px;
  border-radius:20px;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(20px);
  box-shadow: 0 10px 40px rgba(0,0,0,0.3);
  color:white;
}

h2, h3 {
  text-align:center;
  margin-bottom:10px;
}

input {
  width:100%;
  padding:12px;
  margin:8px 0;
  border:none;
  border-radius:10px;
}

button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#00c6ff;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.secondary {
  background:transparent;
  border:1px solid white;
}

#msg #msg {
  text-align:center;
  margin-top:10px;
  font-size:14px;
  padding:10px;
  border-radius:8px;
}

.success {
  background:#2ecc71;
  color:white;
}

.error {
  background:#e74c3c;
  color:white;
}

.toggle {
  display:flex;
  justify-content:flex-end;
  margin-bottom:10px;
}

.hidden {
  display:none;
}
</style>
</head>

<body>

<div class="card">

<div class="toggle">
<label>🌙</label>
<input type="checkbox" onclick="toggleMode()">
</div>

<!-- LOGIN -->
<div id="loginBox">
<h2>🔐 SecureVault</h2>
<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">
<button onclick="togglePass()">👁 Show/Hide Password</button>
<button onclick="login()">Login</button>

<button class="secondary" onclick="showRegister()">Create Account</button>
<button class="secondary" onclick="forgot()">Forgot Password</button>
</div>

<!-- REGISTER -->
<div id="registerBox" class="hidden">
<h2>🆕 Create Account</h2>
<input id="regUser" placeholder="Username">
<input id="regPass" type="password" placeholder="Password (8 chars, uppercase, number, special)">
<button onclick="register()">Register</button>
<button class="secondary" onclick="showLogin()">Back to Login</button>
</div>

<!-- OTP -->
<div id="otpBox" class="hidden">
<h2>🔢 Enter OTP</h2>
<input id="otp" placeholder="Enter OTP">

<p id="timer"></p>

<button onclick="verifyOtp()">Verify OTP</button>
<button class="secondary" onclick="resendOtp()">Resend OTP</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">
<h2>✅ Welcome</h2>
<p id="welcomeText">
Secure Login Successful
</p>
<button onclick="getProfile()">
Check Protected Route
</button>
<button onclick="logout()">Logout</button>
</div>

<!-- RESET -->
<div id="resetBox" class="hidden">
<h3>🔁 Reset Password</h3>
<input id="resetToken" placeholder="Enter token">
<input id="newPass" type="password" placeholder="New password">
<button onclick="resetPassword()">Reset Password</button>
</div>

<p id="msg"></p>

</div>

<script>

  function showMsg(message, type="success") {
  msg.innerText = message;

  msg.className = "";

  msg.classList.add(type);
}

/* ================= CSRF ================= */
async function getCSRF() {
  const res = await fetch("/api/csrf-token");
  const data = await res.json();
  return data.csrfToken;
}

/* ================= TIMER ================= */
let timeLeft = 45;
let timerInterval;

function startTimer() {
  timeLeft = 45;

  clearInterval(timerInterval);

  timerInterval = setInterval(() => {
    document.getElementById("timer").innerText =
      "⏳ Time left: " + timeLeft + "s";

    timeLeft--;

    if (timeLeft < 0) {
      clearInterval(timerInterval);
      document.getElementById("timer").innerText = "❌ OTP expired";
    }
  }, 1000);
}

/* ================= PASSWORD TOGGLE ================= */
function togglePass() {
  pass.type = pass.type === "password" ? "text" : "password";
}

/* ================= DARK MODE ================= */
function toggleMode() {
  document.body.classList.toggle("dark");
}

/* ================= NAVIGATION ================= */
function showRegister() {
  loginBox.classList.add("hidden");
  registerBox.classList.remove("hidden");
}

function showLogin() {
  registerBox.classList.add("hidden");
  resetBox.classList.add("hidden");
  otpBox.classList.add("hidden");
  loginBox.classList.remove("hidden");
}

/* ================= REGISTER ================= */
async function register() {

 const strongPassword =
/^(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&#]).{8,}$/;

if (!strongPassword.test(regPass.value)) {

  showMsg(
    "Password must contain 8 characters, 1 uppercase letter, 1 number and 1 special character",
    "error"
  );

  return;
}

  const token = await getCSRF();

  const res = await fetch("/api/register", {
    method:"POST",
    credentials:"include",
    headers:{
      "Content-Type":"application/json",
      "CSRF-Token":token
    },
    body:JSON.stringify({
      username:regUser.value,
      password:regPass.value
    })
  });

  const data = await res.json();
  showMsg(data.message, data.success ? "success" : "error");

  if (data.success) {
    setTimeout(showLogin, 1000);
  }
}

/* ================= LOGIN ================= */
async function login() {
  const token = await getCSRF();

  const res = await fetch("/api/login", {
    method:"POST",
    credentials:"include",
    headers:{
      "Content-Type":"application/json",
      "CSRF-Token":token
    },
    body:JSON.stringify({
      username:user.value,
      password:pass.value
    })
  });

  const data = await res.json();
  showMsg(data.message, data.success ? "success" : "error");

  if (data.success) {
    loginBox.classList.add("hidden");
    otpBox.classList.remove("hidden");

    startTimer(); // 🔥 TIMER START
  }
}

/* ================= VERIFY OTP ================= */
async function verifyOtp() {
  const token = await getCSRF();

  const res = await fetch("/api/verify-otp", {
    method:"POST",
    credentials:"include",
    headers:{
      "Content-Type":"application/json",
      "CSRF-Token":token
    },
    body:JSON.stringify({
      otp:otp.value
    })
  });

  const data = await res.json();
  showMsg(data.message, data.success ? "success" : "error");

  if (data.success) {
    localStorage.setItem("token", data.token);
    clearInterval(timerInterval);

    otpBox.classList.add("hidden");
    dashboard.classList.remove("hidden");
    welcomeText.innerText =
"Welcome, " + user.value;
  }
}

/* ================= RESEND OTP ================= */
async function resendOtp() {
  const token = await getCSRF();

  const res = await fetch("/api/resend-otp", {
    method:"POST",
    credentials:"include",
    headers:{
      "Content-Type":"application/json",
      "CSRF-Token":token
    }
  });

  const data = await res.json();
 showMsg(data.message, data.success ? "success" : "error");

  if (data.success) {
    startTimer(); // 🔥 RESET TIMER
  }
}

/* ================= FORGOT ================= */
async function forgot() {
  const token = await getCSRF();

  if (!user.value) {
    msg.innerText = "Enter username first";
    return;
  }

  const res = await fetch("/api/forgot-password", {
    method:"POST",
    credentials:"include",
    headers:{
      "Content-Type":"application/json",
      "CSRF-Token":token
    },
    body:JSON.stringify({
      username: user.value
    })
  });

  const data = await res.json();
  showMsg(data.message, data.success ? "success" : "error");

  resetBox.classList.remove("hidden");
}

/* ================= RESET ================= */
async function resetPassword() {
  const token = await getCSRF();

  const res = await fetch("/api/reset-password", {
    method:"POST",
    credentials:"include",
    headers:{
      "Content-Type":"application/json",
      "CSRF-Token":token
    },
    body:JSON.stringify({
      token:resetToken.value,
      newPassword:newPass.value
    })
  });

  const data = await res.json();
  showMsg(data.message, data.success ? "success" : "error");

  if (data.success) {
    showLogin();
  }
}

async function getProfile() {

  const token =
  localStorage.getItem("token");

  const res = await fetch("/api/profile", {

    headers: {
      Authorization: token
    }

  });

  const data = await res.json();

  showMsg(
    data.message,
    data.success ? "success" : "error"
  );
}

/* ================= LOGOUT ================= */
function logout() {
  /* ================= AUTO LOGIN ================= */

window.onload = async function () {

  const token =
  localStorage.getItem("token");

  if (!token) return;

  try {

    const res = await fetch("/api/profile", {

      headers: {
        Authorization: token
      }

    });

    const data = await res.json();

    if (data.success) {

      loginBox.classList.add("hidden");

      dashboard.classList.remove("hidden");

      welcomeText.innerText =
      data.message;

    }

  } catch (err) {

    console.log(err);

  }
};
  localStorage.removeItem("token");
  location.reload();
}

</script>

</body>
</html>
